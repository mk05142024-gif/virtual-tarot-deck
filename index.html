<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Celestial Arcana</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="app">

    <h1>✨ Celestial Arcana ✨</h1>
    <p class="subtitle">Read the stars. Reveal the self.</p>

    <div class="controls">
      <button onclick="shuffleDeck()">✨ Shuffle Deck</button>
      <button onclick="startReading(3)">3 Card Spread</button>
      <button onclick="startReading(5)">5 Card Spread</button>
    </div>

    <div id="table">
      <div id="deck"></div>
      <div id="spread"></div>
    </div>

    <div id="summary"></div>

  </div>

  <!-- 🌌 AUDIO LAYER -->
  <audio id="ambientSound" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_d1b5c1d4b3.mp3?filename=ambient-space-110764.mp3">
  </audio>

  <audio id="flipSound">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7d3b0c2a8b.mp3?filename=card-flip-2-107692.mp3">
  </audio>

  <audio id="shuffleSound">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_3c0c1d1b7f.mp3?filename=magic-whoosh-110766.mp3">
  </audio>

  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Virtual Tarot Deck</title>
  <style>
    body {
      background: #0b0b1a;
      color: #f5e9ff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #6c3cff;
      color: white;
    }

    #card {
      margin-top: 40px;
      font-size: 24px;
      min-height: 40px;
    }
  </style>
</head>

<body>

  <h1>🔮 Virtual Tarot Deck</h1>

  <button onclick="drawCard()">Draw a Card</button>

  <div id="card"></div>

  <script>
   const deck = [
  { name: "The Fool", img: "https://upload.wikimedia.org/wikipedia/commons/9/90/RWS_Tarot_00_Fool.jpg" },
  { name: "The Magician", img: "https://upload.wikimedia.org/wikipedia/commons/d/de/RWS_Tarot_01_Magician.jpg" },
  { name: "The High Priestess", img: "https://upload.wikimedia.org/wikipedia/commons/4/4d/RWS_Tarot_02_High_Priestess.jpg" },
  { name: "The Emperor", img: "https://upload.wikimedia.org/wikipedia/commons/9/9c/RWS_Tarot_04_Emperor.jpg" }
];
    ];

    function drawCard() {
      const randomIndex = Math.floor(Math.random() * deck.length);
      const card = deck[randomIndex];
     document.getElementById("card").innerHTML = `
  <h2>${card.name}</h2>
  <img src="${card.img}" style="width:200px; border-radius:12px; margin-top:10px;">
`;
    }
  </script>

</body>
</html>
